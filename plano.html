<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano de Estudos - StudyFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#eef2ff;
  --card:#ffffff;
  --primary:#4f46e5;
  --purple:#7c3aed;
  --green:#16a34a;
  --red:#dc2626;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --shadow:0 10px 25px rgba(15,23,42,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Poppins,sans-serif;
  background:
    radial-gradient(circle at top left,#c7d2fe,transparent 30%),
    radial-gradient(circle at bottom right,#ddd6fe,transparent 30%),
    linear-gradient(135deg,#eef2ff,#f8fafc);
  min-height:100vh;
  padding:26px;
  color:var(--text);
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:24px;
}

.logo{
  font-size:2.5rem;
  font-weight:800;
  color:var(--primary);
}

.subtitle{
  color:var(--muted);
  font-weight:600;
}

.btn{
  border:none;
  border-radius:14px;
  padding:13px 18px;
  background:linear-gradient(135deg,var(--primary),var(--purple));
  color:white;
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  text-decoration:none;
  display:inline-block;
}

.btn:hover{
  opacity:.9;
}

.container{
  display:grid;
  grid-template-columns:1fr 1.3fr;
  gap:22px;
}

.panel{
  background:rgba(255,255,255,.94);
  padding:24px;
  border-radius:24px;
  box-shadow:var(--shadow);
}

.title{
  color:var(--primary);
  font-size:1.5rem;
  font-weight:800;
  margin-bottom:8px;
}

.help{
  color:var(--muted);
  font-weight:600;
  margin-bottom:18px;
}

label{
  font-weight:800;
  color:var(--text);
  display:block;
  margin:12px 0 6px;
}

input, select, textarea{
  width:100%;
  padding:13px;
  border:1px solid var(--border);
  border-radius:14px;
  font-family:inherit;
  font-size:1rem;
  outline:none;
  background:white;
}

textarea{
  min-height:130px;
  resize:vertical;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.btn-green{
  background:var(--green);
}

.btn-red{
  background:var(--red);
}

.list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.item{
  background:white;
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  box-shadow:0 5px 14px rgba(15,23,42,.06);
}

.item-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:8px;
}

.materia{
  font-size:1.15rem;
  font-weight:800;
  color:var(--primary);
}

.data{
  color:var(--muted);
  font-weight:700;
}

.anotacao{
  white-space:pre-line;
  line-height:1.6;
  margin-top:10px;
}

.empty{
  background:white;
  border:1px solid var(--border);
  padding:18px;
  border-radius:18px;
  font-weight:800;
}

.filtro{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:16px;
}

.badge{
  display:inline-block;
  background:#eef2ff;
  color:var(--primary);
  padding:5px 10px;
  border-radius:999px;
  font-size:.85rem;
  font-weight:800;
}

@media(max-width:850px){
  body{
    padding:16px;
  }

  .container{
    grid-template-columns:1fr;
  }

  .logo{
    font-size:2rem;
  }

  .filtro{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <div>
    <div class="logo">StudyFlow</div>
    <div class="subtitle">📅 Plano de Estudos — organize horários, matérias e fórmulas.</div>
  </div>

  <a class="btn" href="index.html">⬅ Voltar</a>
</header>

<div class="container">

  <section class="panel">
    <div class="title">Criar plano</div>
    <div class="help">Coloque o dia, horário, matéria e suas anotações importantes.</div>

    <label>Dia</label>
    <input id="planoDia" type="date">

    <label>Horário</label>
    <input id="planoHorario" type="time">

    <label>Matéria</label>
    <select id="planoMateria">
      <option>Matemática</option>
      <option>Física</option>
      <option>Química</option>
      <option>Biologia</option>
      <option>História</option>
      <option>Geografia</option>
      <option>Português</option>
      <option>Inglês</option>
      <option>Redação</option>
      <option>Filosofia</option>
      <option>Sociologia</option>
      <option>Vestibulares</option>
    </select>

    <label>Conteúdo / fórmulas / anotações</label>
    <textarea id="planoAnotacao" placeholder="Exemplo:
Estudar mitose e meiose.
Fórmula: Ec = m.v²/2
Fazer lista de exercícios da página 30."></textarea>

    <div class="actions">
      <button class="btn btn-green" onclick="salvarPlano()">Adicionar ao plano</button>
      <button class="btn btn-red" onclick="limparCampos()">Limpar</button>
    </div>
  </section>

  <section class="panel">
    <div class="title">Meu plano</div>
    <div class="help">Veja seus estudos salvos neste aparelho.</div>

    <div class="filtro">
      <input id="pesquisaPlano" placeholder="🔍 Pesquisar matéria/anotação" oninput="mostrarPlanos()">
      <select id="filtroMateria" onchange="mostrarPlanos()">
        <option value="">Todas as matérias</option>
        <option>Matemática</option>
        <option>Física</option>
        <option>Química</option>
        <option>Biologia</option>
        <option>História</option>
        <option>Geografia</option>
        <option>Português</option>
        <option>Inglês</option>
        <option>Redação</option>
        <option>Filosofia</option>
        <option>Sociologia</option>
        <option>Vestibulares</option>
      </select>
    </div>

    <div id="listaPlano" class="list"></div>
  </section>

</div>

<script>
function pegarPlanos(){
  return JSON.parse(localStorage.getItem("studyflow_planos") || "[]");
}

function salvarLista(planos){
  localStorage.setItem("studyflow_planos", JSON.stringify(planos));
}

function salvarPlano(){
  const dia = document.getElementById("planoDia").value;
  const horario = document.getElementById("planoHorario").value;
  const materia = document.getElementById("planoMateria").value;
  const anotacao = document.getElementById("planoAnotacao").value.trim();

  if(!dia || !horario || !anotacao){
    alert("Preencha dia, horário e anotação.");
    return;
  }

  const planos = pegarPlanos();

  planos.push({
    id: Date.now(),
    dia,
    horario,
    materia,
    anotacao,
    concluido:false
  });

  salvarLista(planos);
  limparCampos();
  mostrarPlanos();
}

function limparCampos(){
  document.getElementById("planoDia").value = "";
  document.getElementById("planoHorario").value = "";
  document.getElementById("planoMateria").value = "Matemática";
  document.getElementById("planoAnotacao").value = "";
}

function formatarData(data){
  if(!data) return "";
  const partes = data.split("-");
  return `${partes[2]}/${partes[1]}/${partes[0]}`;
}

function alternarConcluido(id){
  const planos = pegarPlanos();

  const plano = planos.find(p => p.id === id);

  if(plano){
    plano.concluido = !plano.concluido;
  }

  salvarLista(planos);
  mostrarPlanos();
}

function excluirPlano(id){
  if(!confirm("Deseja excluir este plano?")) return;

  const planos = pegarPlanos().filter(p => p.id !== id);

  salvarLista(planos);
  mostrarPlanos();
}

function mostrarPlanos(){
  const lista = document.getElementById("listaPlano");
  const pesquisa = document.getElementById("pesquisaPlano").value.toLowerCase();
  const filtroMateria = document.getElementById("filtroMateria").value;

  let planos = pegarPlanos();

  planos.sort((a,b)=>{
    const dataA = `${a.dia} ${a.horario}`;
    const dataB = `${b.dia} ${b.horario}`;
    return dataA.localeCompare(dataB);
  });

  if(filtroMateria){
    planos = planos.filter(p => p.materia === filtroMateria);
  }

  if(pesquisa){
    planos = planos.filter(p =>
      p.materia.toLowerCase().includes(pesquisa) ||
      p.anotacao.toLowerCase().includes(pesquisa)
    );
  }

  if(planos.length === 0){
    lista.innerHTML = `<div class="empty">Nenhum plano encontrado.</div>`;
    return;
  }

  lista.innerHTML = planos.map(p => `
    <div class="item">
      <div class="item-top">
        <div>
          <div class="materia">${p.concluido ? "✅" : "📌"} ${p.materia}</div>
          <div class="data">${formatarData(p.dia)} às ${p.horario}</div>
        </div>

        <span class="badge">${p.concluido ? "Concluído" : "Pendente"}</span>
      </div>

      <div class="anotacao">${p.anotacao}</div>

      <div class="actions">
        <button class="btn" onclick="alternarConcluido(${p.id})">
          ${p.concluido ? "Marcar pendente" : "Marcar concluído"}
        </button>

        <button class="btn btn-red" onclick="excluirPlano(${p.id})">
          Excluir
        </button>
      </div>
    </div>
  `).join("");
}

mostrarPlanos();
</script>

</body>
</html>
