<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Hub de Estudos</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e67e22;
            --bg: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
        }

        /* Área dos Arquivos */
        #main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .folder {
            background: #fff;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            border-left: 5px solid var(--secondary);
            font-weight: bold;
            transition: 0.2s;
        }

        .folder:hover { background: #fdf2e9; }

        .file-link {
            display: block;
            margin: 5px 0 5px 25px;
            color: var(--primary);
            text-decoration: none;
            padding: 5px;
        }

        .file-link:hover { text-decoration: underline; color: var(--secondary); }

        /* Calculadora Lateral */
        #calc-container {
            width: 300px;
            background: var(--primary);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
        }

        #calc-display {
            width: 100%;
            height: 50px;
            font-size: 1.5rem;
            text-align: right;
            margin-bottom: 10px;
            padding: 10px;
            box-sizing: border-box;
            border: none;
            border-radius: 5px;
            background: #ecf0f1;
            color: #2c3e50;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 1.1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #34495e;
            color: white;
        }

        button:hover { background: #456789; }
        .btn-op { background: var(--secondary); }
        .btn-equal { grid-column: span 2; background: #27ae60; }
    </style>
</head>
<body>

    <div id="main-content">
        <h1>📚 Meus Materiais de Estudo</h1>
        <div id="lista-arquivos">Carregando dados...</div>
    </div>

    <div id="calc-container">
        <h3>🧮 Calculadora</h3>
        <input type="text" id="calc-display" readonly>
        <div class="calc-grid">
            <button onclick="clearCalc()">C</button>
            <button onclick="addChar('/')">/</button>
            <button onclick="addChar('*')">*</button>
            <button onclick="backspace()">⌫</button>
            
            <button onclick="addChar('7')">7</button>
            <button onclick="addChar('8')">8</button>
            <button onclick="addChar('9')">9</button>
            <button onclick="addChar('-')">-</button>
            
            <button onclick="addChar('4')">4</button>
            <button onclick="addChar('5')">5</button>
            <button onclick="addChar('6')">6</button>
            <button onclick="addChar('+')">+</button>
            
            <button onclick="addChar('1')">1</button>
            <button onclick="addChar('2')">2</button>
            <button onclick="addChar('3')">3</button>
            <button class="btn-equal" onclick="calculate()">=</button>
            
            <button onclick="addChar('0')" style="grid-column: span 2;">0</button>
            <button onclick="addChar('.')">.</button>
        </div>
    </div>

    <script>
        // --- LÓGICA DE CARREGAMENTO AUTOMÁTICO ---
        window.onload = function() {
            fetch('dados.txt')
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.text();
                })
                .then(data => {
                    const linhas = data.split('\n');
                    processarDados(linhas);
                })
                .catch(() => {
                    document.getElementById('lista-arquivos').innerHTML = 
                    "Erro ao carregar dados.txt. Verifique se o arquivo está no GitHub!";
                });
        };

        function processarDados(linhas) {
            const container = document.getElementById('lista-arquivos');
            container.innerHTML = ""; 

            linhas.forEach(linha => {
                linha = linha.trim();
                if (!linha || linha.startsWith("Pasta:")) return;

                if (linha.startsWith("[DIR]")) {
                    const nomePasta = linha.replace("[DIR]", "");
                    const div = document.createElement('div');
                    div.className = 'folder';
                    div.innerText = "📁 " + nomePasta;
                    container.appendChild(div);
                } else {
                    const link = document.createElement('a');
                    link.className = 'file-link';
                    // IMPORTANTE: O link aponta para a pasta Estudos no seu GitHub
                    link.href = "Estudos/" + linha; 
                    link.target = "_blank";
                    link.innerText = "📄 " + linha.split('/').pop();
                    container.appendChild(link);
                }
            });
        }

        // --- LÓGICA DA CALCULADORA ---
        const display = document.getElementById('calc-display');

        function addChar(char) { display.value += char; }
        function clearCalc() { display.value = ""; }
        function backspace() { display.value = display.value.slice(0, -1); }
        function calculate() {
            try {
                display.value = eval(display.value);
            } catch {
                display.value = "Erro";
                setTimeout(clearCalc, 1000);
            }
        }

        // Suporte ao teclado
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9' || ['+','-','*','/','.'].includes(e.key)) addChar(e.key);
            if (e.key === 'Enter') calculate();
            if (e.key === 'Backspace') backspace();
            if (e.key === 'Escape') clearCalc();
        });
    </script>
</body>
</html>
