<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendel Hub | Dashboard de Estudos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a56d4;
            --bg: #f8faff;
            --sidebar: #ffffff;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --accent: #eef2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Moderna */
        nav { width: 280px; background: var(--sidebar); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 40px 24px; }
        .brand { font-size: 1.6rem; font-weight: 800; color: var(--primary); margin-bottom: 48px; display: flex; align-items: center; gap: 12px; }
        
        .nav-section { margin-bottom: 32px; }
        .nav-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-sub); margin-bottom: 16px; display: block; }
        
        .nav-link { 
            padding: 14px 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; 
            font-weight: 600; color: var(--text-sub); transition: 0.3s; margin-bottom: 8px; text-decoration: none;
        }
        .nav-link:hover { background: #f1f5f9; color: var(--primary); }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 10px 20px -5px rgba(67, 97, 238, 0.3); }

        /* Área de Conteúdo */
        main { flex: 1; padding: 60px; overflow-y: auto; }
        .page-header { margin-bottom: 40px; }
        .page-header h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; }
        .page-header p { color: var(--text-sub); font-size: 1.1rem; }

        .view { display: none; animation: slideUp 0.5s ease-out forwards; }
        .view.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid de Matérias */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .subject-card { 
            background: var(--card); padding: 40px 30px; border-radius: 24px; text-align: center; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
        }
        .subject-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .subject-card i { font-size: 2.5rem; color: var(--primary); margin-bottom: 20px; display: block; }
        .subject-card h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }

        /* Lista de Arquivos */
        .file-list { background: white; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); overflow: hidden; }
        .file-item { 
            display: flex; align-items: center; padding: 24px 32px; border-bottom: 1px solid #f1f5f9; 
            text-decoration: none; color: inherit; transition: 0.2s;
        }
        .file-item:hover { background: #f8faff; }
        .file-item:last-child { border-bottom: none; }
        .file-icon { font-size: 1.8rem; color: #ef4444; margin-right: 24px; }
        .file-details { flex: 1; }
        .file-path { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }
        .file-name { font-weight: 600; font-size: 1rem; color: var(--text-main); }
        .btn-back { 
            background: white; border: 1px solid #e2e8f0; padding: 12px 24px; border-radius: 12px; 
            cursor: pointer; font-weight: 700; margin-bottom: 32px; display: flex; align-items: center; gap: 10px;
            transition: 0.3s;
        }
        .btn-back:hover { background: #f1f5f9; }

        /* Calculadora Estilizada */
        .calc-wrapper { max-width: 400px; margin: 0 auto; background: #0f172a; padding: 35px; border-radius: 35px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .calc-screen { width: 100%; background: transparent; border: none; color: white; font-size: 3rem; text-align: right; margin-bottom: 30px; outline: none; }
        .calc-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .c-btn { height: 70px; border-radius: 18px; border: none; background: #1e293b; color: white; font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .c-btn:hover { background: #334155; }
        .c-btn.op { background: var(--primary); }
        .c-btn.eq { background: #10b981; grid-column: span 2; }
        .c-btn.del { background: #f43f5e; }
    </style>
</head>
<body>

    <nav>
        <div class="brand"><i class="fas fa-dna"></i> MENDEL</div>
        
        <div class="nav-section">
            <span class="nav-label">Acadêmico</span>
            <div class="nav-link active" onclick="showTab('materias', this)"><i class="fas fa-grid-2"></i> Materiais</div>
            <div class="nav-link" onclick="showTab('calc', this)"><i class="fas fa-calculator"></i> Calculadora</div>
        </div>

        <div class="nav-section">
            <span class="nav-label">Links Rápidos</span>
            <a href="https://pmais.p4ed.com/dashboard" target="_blank" class="nav-link"><i class="fas fa-graduation-cap"></i> Portal P+</a>
        </div>
    </nav>

    <main>
        <div id="materias" class="view active">
            <div class="page-header">
                <h1>Meus Conteúdos</h1>
                <p>Selecione uma disciplina para acessar os arquivos.</p>
            </div>

            <div id="grid-subjects" class="grid"></div>

            <div id="view-files" style="display:none;">
                <button class="btn-back" onclick="goBack()"><i class="fas fa-arrow-left"></i> Voltar para Matérias</button>
                <h2 id="current-title" style="margin-bottom: 24px; font-weight: 800;"></h2>
                <div id="list-container" class="file-list"></div>
            </div>
        </div>

        <div id="calc" class="view">
            <div class="page-header">
                <h1>Calculadora de Apoio</h1>
                <p>Ferramenta rápida para auxilia-lo nos estudos.</p>
            </div>
            <div class="calc-wrapper">
                <input type="text" id="scr" class="calc-screen" readonly placeholder="0">
                <div class="calc-btns">
                    <button class="c-btn del" onclick="clr()">C</button>
                    <button class="c-btn op" onclick="add('/')">/</button>
                    <button class="c-btn op" onclick="add('*')">×</button>
                    <button class="c-btn" onclick="bk()"><i class="fas fa-backspace"></i></button>
                    <button class="c-btn" onclick="add('7')">7</button>
                    <button class="c-btn" onclick="add('8')">8</button>
                    <button class="c-btn" onclick="add('9')">9</button>
                    <button class="c-btn op" onclick="add('-')">-</button>
                    <button class="c-btn" onclick="add('4')">4</button>
                    <button class="c-btn" onclick="add('5')">5</button>
                    <button class="c-btn" onclick="add('6')">6</button>
                    <button class="c-btn op" onclick="add('+')">+</button>
                    <button class="c-btn" onclick="add('1')">1</button>
                    <button class="c-btn" onclick="add('2')">2</button>
                    <button class="c-btn" onclick="add('3')">3</button>
                    <button class="c-btn eq" onclick="res()">=</button>
                    <button class="c-btn" style="grid-column: span 2;" onclick="add('0')">0</button>
                    <button class="c-btn" onclick="add('.')">.</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let db = [];

        function showTab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        window.onload = () => {
            fetch('dados.txt?v=' + Date.now())
                .then(r => r.text())
                .then(data => {
                    // Limpeza pesada dos dados para garantir que barras e espaços não quebrem nada
                    db = data.split('\n')
                             .filter(l => l.trim() !== "")
                             .map(l => l.replace(/\\/g, '/').trim());
                    renderGrid();
                });
        };

        function getCleanSubject(line) {
            // Remove prefixos e a pasta raiz "Estudos/" para pegar o nome real da matéria
            let path = line.replace("[DIR]", "").replace("[ARQ]", "").replace("Pasta:", "").trim();
            if(path.startsWith("Estudos/")) path = path.replace("Estudos/", "");
            let parts = path.split('/');
            return parts[0]; // Retorna apenas o primeiro nível (ex: Biologia, Fisica)
        }

        function renderGrid() {
            const grid = document.getElementById('grid-subjects');
            const files = document.getElementById('view-files');
            grid.style.display = "grid";
            files.style.display = "none";
            grid.innerHTML = "";

            let subjects = new Set();
            db.forEach(l => {
                let s = getCleanSubject(l);
                // Filtro crucial: Não adiciona a própria palavra "Estudos" como uma matéria
                if(s && s !== "Estudos") subjects.add(s);
            });

            subjects.forEach(s => {
                const card = document.createElement('div');
                card.className = "subject-card";
                card.innerHTML = `<i class="fas fa-folder-open"></i><h3>${s}</h3><p style="color:var(--text-sub); font-size:0.9rem;">Abrir arquivos</p>`;
                card.onclick = () => openFiles(s);
                grid.appendChild(card);
            });
        }

        function openFiles(subject) {
            document.getElementById('grid-subjects').style.display = "none";
            document.getElementById('view-files').style.display = "block";
            document.getElementById('current-title').innerText = subject;
            
            const container = document.getElementById('list-container');
            container.innerHTML = "";

            db.forEach(line => {
                // Lógica de busca: O arquivo deve conter o nome da matéria e ser marcado como [ARQ]
                if(line.includes("[ARQ]") && (line.includes("/" + subject + "/") || line.includes("Estudos/" + subject))) {
                    
                    let fullPath = line.replace("[ARQ]", "").trim();
                    let parts = fullPath.split('/');
                    let name = parts.pop(); // Nome do arquivo

                    // Cria o "breadcrumb" (ex: Croti > 1P)
                    let subPath = parts.slice(parts.indexOf(subject) + 1).join(' ❯ ');

                    const item = document.createElement('a');
                    item.className = "file-item";
                    item.href = encodeURI(fullPath);
                    item.target = "_blank";
                    item.innerHTML = `
                        <i class="fas fa-file-pdf file-icon"></i>
                        <div class="file-details">
                            ${subPath ? `<span class="file-path">${subPath}</span>` : ''}
                            <span class="file-name">${name}</span>
                        </div>
                        <i class="fas fa-external-link-alt" style="color:#cbd5e1"></i>
                    `;
                    container.appendChild(item);
                }
            });

            if(container.innerHTML === "") {
                container.innerHTML = "<div style='padding:50px; text-align:center; color:var(--text-sub);'>Nenhum arquivo encontrado aqui. Verifique se o caminho no arquivo dados.txt está correto.</div>";
            }
        }

        function goBack() { renderGrid(); }

        // Calculadora
        const s = document.getElementById('scr');
        function add(v) { s.value += v; }
        function clr() { s.value = ""; }
        function bk() { s.value = s.value.slice(0, -1); }
        function res() { try { s.value = eval(s.value); } catch { s.value = "Erro"; } }
    </script>
</body>
</html>
