<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jonatas Hub | Oficial</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
--primary:#4361ee;
--bg:#f8faff;
--sidebar:#ffffff;
--text-main:#1e293b;
--text-sub:#64748b;
--folder:#ffca28;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
display:flex;
height:100vh;
font-family:sans-serif;
background:var(--bg);
}

/* SIDEBAR */
nav{
width:240px;
background:#fff;
padding:20px;
border-right:1px solid #ddd;
}

.logo{
font-weight:bold;
font-size:20px;
margin-bottom:20px;
color:var(--primary);
}

.nav-link{
padding:10px;
border-radius:10px;
cursor:pointer;
margin-bottom:5px;
}

.nav-link:hover{background:#eee;}
.nav-link.active{background:var(--primary);color:#fff;}

/* MAIN */
main{
flex:1;
padding:20px;
overflow:auto;
}

.item{
background:#fff;
padding:15px;
margin-bottom:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
cursor:pointer;
transition:0.2s;
}

.item:hover{
transform:translateX(5px);
border:1px solid var(--primary);
}

.icon-folder{color:var(--folder);}
.icon-file{color:red;}

.breadcrumb{
margin-bottom:15px;
color:gray;
cursor:pointer;
}

/* CALCULADORA */
.calc{
max-width:300px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px;
}

.calc input{
width:100%;
height:50px;
font-size:20px;
margin-bottom:10px;
text-align:right;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:5px;
}

button{
height:50px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<nav>
<div class="logo">JN_PP</div>

<div class="nav-link active" onclick="changeTab('materiais',this)">Materiais</div>
<div class="nav-link" onclick="changeTab('calc',this)">Calculadora</div>
</nav>

<main>

<div id="materiais">
<div id="breadcrumb" class="breadcrumb">Início</div>
<div id="list"></div>
</div>

<div id="calc" style="display:none;">
<div class="calc">
<input id="display" readonly>

<div class="grid">
<button onclick="clr()">C</button>
<button onclick="ins('/')">/</button>
<button onclick="ins('*')">*</button>
<button onclick="bk()">⌫</button>

<button onclick="ins(7)">7</button>
<button onclick="ins(8)">8</button>
<button onclick="ins(9)">9</button>
<button onclick="ins('-')">-</button>

<button onclick="ins(4)">4</button>
<button onclick="ins(5)">5</button>
<button onclick="ins(6)">6</button>
<button onclick="ins('+')">+</button>

<button onclick="ins(1)">1</button>
<button onclick="ins(2)">2</button>
<button onclick="ins(3)">3</button>
<button onclick="calc()">=</button>
</div>

</div>
</div>

</main>

<script>

let db=[];
let path="";

/* BASE DO GITHUB */
const repo = window.location.pathname.split("/")[1];
const BASE = "/" + repo + "/Estudos/";

/* ---------------- */

async function start(){
let txt = await fetch("dados.txt?v="+Date.now()).then(r=>r.text());

db = txt.split("\n").map(l=>l.trim()).filter(l=>l);

render();
}

/* ---------------- */

function render(){
let list=document.getElementById("list");
list.innerHTML="";

let folders=new Set();
let files=[];

db.forEach(p=>{

if(!path){
let first=p.split("/")[0];
if(p.includes("/")) folders.add(first);
else files.push(p);
}else{
if(p.startsWith(path)){
let rest=p.slice(path.length).replace(/^\/+/,"");
let next=rest.split("/")[0];

if(rest.includes("/")) folders.add(next);
else files.push(p);
}
}

});

/* pastas */
folders.forEach(f=>{
let div=document.createElement("div");
div.className="item";
div.innerHTML=`<span><i class="fas fa-folder icon-folder"></i> ${f}</span>`;
div.onclick=()=>{
path = path ? path+"/"+f : f;
render();
};
list.appendChild(div);
});

/* arquivos */
files.forEach(f=>{
let a=document.createElement("a");
a.className="item";

/* 🔥 LINK CORRETO FINAL */
a.href = BASE + f;

a.target="_blank";

a.innerHTML=`<span><i class="fas fa-file icon-file"></i> ${f.split("/").pop()}</span>`;
list.appendChild(a);
});

}

/* ---------------- */

function changeTab(t,el){
document.getElementById("materiais").style.display = t==="materiais"?"block":"none";
document.getElementById("calc").style.display = t==="calc"?"block":"none";

document.querySelectorAll(".nav-link").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
}

/* CALCULADORA */
let d=document.getElementById("display");

function ins(v){d.value+=v;}
function clr(){d.value="";}
function bk(){d.value=d.value.slice(0,-1);}
function calc(){
try{d.value=eval(d.value);}
catch{d.value="Erro";}
}

start();

</script>

</body>
</html>
