<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Estudos Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --bg: #f8f9fd;
            --sidebar: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        nav {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 10px;
        }

        .nav-group { margin-bottom: 30px; }
        .nav-label { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: var(--text-light);
            margin-bottom: 15px;
            padding-left: 10px;
            display: block;
        }

        .nav-item {
            padding: 14px 18px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.3s ease;
            margin-bottom: 5px;
        }

        .nav-item:hover { background: #f1f5f9; color: var(--primary); }
        .nav-item.active { background: var(--primary); color: var(--white); box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3); }

        /* --- CONTEÚDO PRINCIPAL --- */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .header-content { margin-bottom: 30px; }
        .header-content h1 { font-size: 1.8rem; font-weight: 700; }
        .header-content p { color: var(--text-light); }

        .tab-content { display: none; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- GRID DE MATÉRIAS --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .card-subject {
            background: var(--white);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .card-subject:hover {
            transform: translateY(-8px);
            border-color: var(--primary-light);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .card-subject .icon-box {
            width: 70px;
            height: 70px;
            background: #eef2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.8rem;
            color: var(--primary);
        }

        .card-subject h3 { font-size: 1.1rem; margin-bottom: 5px; }

        /* --- LISTA DE FICHEIROS --- */
        .files-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn-back {
            background: var(--white);
            border: 1px solid #e2e8f0;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-back:hover { background: #f1f5f9; }

        .file-list {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .file-row {
            display: flex;
            align-items: center;
            padding: 18px 25px;
            border-bottom: 1px solid #f1f5f9;
            text-decoration: none;
            color: inherit;
            transition: 0.2s;
        }

        .file-row:hover { background: #f8fafc; }
        .file-row:last-child { border-bottom: none; }

        .file-icon { font-size: 1.5rem; color: #ef4444; margin-right: 20px; }
        
        .file-info { flex: 1; }
        .file-name { display: block; font-weight: 600; margin-bottom: 4px; }
        .file-path { display: block; font-size: 0.75rem; color: var(--primary); font-weight: 700; text-transform: uppercase; }

        /* --- CALCULADORA --- */
        .calc-container {
            max-width: 380px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .calc-display {
            width: 100%;
            height: 80px;
            background: transparent;
            border: none;
            color: white;
            font-size: 2.5rem;
            text-align: right;
            margin-bottom: 20px;
            outline: none;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calc-btn {
            height: 65px;
            border-radius: 16px;
            border: none;
            background: #334155;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .calc-btn:hover { background: #475569; }
        .calc-btn.op { background: var(--primary); }
        .calc-btn.eq { background: #10b981; grid-column: span 2; }
        .calc-btn.clear { background: #f43f5e; }

    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-graduation-cap"></i> MENDEL HUB</div>
        
        <div class="nav-group">
            <span class="nav-label">Menu Principal</span>
            <div class="nav-item active" onclick="switchTab('materias', this)">
                <i class="fas fa-layer-group"></i> Meus Materiais
            </div>
            <div class="nav-item" onclick="switchTab('calculadora', this)">
                <i class="fas fa-calculator"></i> Calculadora
            </div>
        </div>

        <div class="nav-group">
            <span class="nav-label">Atalhos</span>
            <div class="nav-item" onclick="window.open('https://pmais.p4ed.com/dashboard', '_blank')">
                <i class="fas fa-external-link-alt"></i> Portal do Aluno
            </div>
        </div>
    </nav>

    <main>
        <div id="materias" class="tab-content active">
            <div class="header-content">
                <h1>Bem-vindo ao teu Hub</h1>
                <p>Seleciona uma disciplina para ver os arquivos disponíveis.</p>
            </div>

            <div id="subjects-grid" class="grid-container">
                </div>

            <div id="files-view" style="display: none;">
                <div class="files-header">
                    <button class="btn-back" onclick="backToSubjects()"><i class="fas fa-arrow-left"></i> Voltar</button>
                    <h2 id="current-subject-name">Disciplina</h2>
                </div>
                <div id="files-container" class="file-list">
                    </div>
            </div>
        </div>

        <div id="calculadora" class="tab-content">
            <div class="header-content">
                <h1>Calculadora de Apoio</h1>
                <p>Usa esta ferramenta para cálculos rápidos durante o estudo.</p>
            </div>
            
            <div class="calc-container">
                <input type="text" id="display" class="calc-display" readonly placeholder="0">
                <div class="calc-grid">
                    <button class="calc-btn clear" onclick="clearCalc()">C</button>
                    <button class="calc-btn op" onclick="press('/')">÷</button>
                    <button class="calc-btn op" onclick="press('*')">×</button>
                    <button class="calc-btn" onclick="backspace()"><i class="fas fa-backspace"></i></button>
                    
                    <button class="calc-btn" onclick="press('7')">7</button>
                    <button class="calc-btn" onclick="press('8')">8</button>
                    <button class="calc-btn" onclick="press('9')">9</button>
                    <button class="calc-btn op" onclick="press('-')">−</button>
                    
                    <button class="calc-btn" onclick="press('4')">4</button>
                    <button class="calc-btn" onclick="press('5')">5</button>
                    <button class="calc-btn" onclick="press('6')">6</button>
                    <button class="calc-btn op" onclick="press('+')">+</button>
                    
                    <button class="calc-btn" onclick="press('1')">1</button>
                    <button class="calc-btn" onclick="press('2')">2</button>
                    <button class="calc-btn" onclick="press('3')">3</button>
                    <button class="calc-btn eq" onclick="calculate()">=</button>
                    
                    <button class="calc-btn" style="grid-column: span 2;" onclick="press('0')">0</button>
                    <button class="calc-btn" onclick="press('.')">.</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let allData = [];

        // Trocar de Abas
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        // Carregar Dados
        window.onload = function() {
            fetch('dados.txt?v=' + Date.now())
                .then(r => r.text())
                .then(text => {
                    allData = text.split('\n')
                                  .filter(l => l.trim() !== "")
                                  .map(l => l.replace(/\\/g, '/')); // Padroniza barras do Windows
                    loadSubjects();
                });
        };

        function loadSubjects() {
            const grid = document.getElementById('subjects-grid');
            const filesView = document.getElementById('files-view');
            grid.style.display = "grid";
            filesView.style.display = "none";
            grid.innerHTML = "";

            let subjectsSet = new Set();

            allData.forEach(line => {
                // Limpeza: Remove prefixos e ignora a raiz "Estudos"
                let path = line.replace("[DIR]", "").replace("[ARQ]", "").trim();
                if(path.startsWith("Estudos/")) path = path.replace("Estudos/", "");
                
                let parts = path.split('/');
                // O primeiro item após a limpeza é o nome da Matéria
                if(parts[0] && parts[0] !== "Estudos") {
                    subjectsSet.add(parts[0]);
                }
            });

            subjectsSet.forEach(subject => {
                const card = document.createElement('div');
                card.className = "card-subject";
                card.innerHTML = `
                    <div class="icon-box"><i class="fas fa-book"></i></div>
                    <h3>${subject}</h3>
                    <p style="font-size: 0.8rem; color: #64748b;">Ver materiais</p>
                `;
                card.onclick = () => openSubject(subject);
                grid.appendChild(card);
            });
        }

        function openSubject(subjectName) {
            document.getElementById('subjects-grid').style.display = "none";
            document.getElementById('files-view').style.display = "block";
            document.getElementById('current-subject-name').innerText = subjectName;
            
            const container = document.getElementById('files-container');
            container.innerHTML = "";

            allData.forEach(line => {
                // Regra de ouro: Só mostra se for ARQUIVO e estiver dentro da pasta da matéria
                if(line.includes("[ARQ]") && (line.includes("/" + subjectName + "/") || line.includes("Estudos/" + subjectName))) {
                    
                    let fullPath = line.replace("[ARQ]", "").trim();
                    let parts = fullPath.split('/');
                    let fileName = parts[parts.length - 1];

                    // Identifica as subpastas para criar a etiqueta (ex: Croti > 1P)
                    let startIndex = parts.indexOf(subjectName);
                    let breadcrumb = parts.slice(startIndex + 1, -1).join(' ❯ ');

                    const row = document.createElement('a');
                    row.className = "file-row";
                    row.href = encodeURI(fullPath);
                    row.target = "_blank";
                    row.innerHTML = `
                        <i class="fas fa-file-pdf file-icon"></i>
                        <div class="file-info">
                            ${breadcrumb ? `<span class="file-path">${breadcrumb}</span>` : ''}
                            <span class="file-name">${fileName}</span>
                        </div>
                        <i class="fas fa-chevron-right" style="color: #cbd5e1"></i>
                    `;
                    container.appendChild(row);
                }
            });

            if(container.innerHTML === "") {
                container.innerHTML = "<p style='padding: 30px; text-align: center; color: #94a3b8;'>Nenhum ficheiro encontrado nesta pasta.</p>";
            }
        }

        function backToSubjects() { loadSubjects(); }

        // Lógica Calculadora
        const disp = document.getElementById('display');
        function press(v) { disp.value += v; }
        function clearCalc() { disp.value = ""; }
        function backspace() { disp.value = disp.value.slice(0, -1); }
        function calculate() {
            try { disp.value = eval(disp.value); } catch { disp.value = "Erro"; }
        }
    </script>
</body>
</html>
