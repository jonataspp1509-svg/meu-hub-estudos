<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JN_PP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--primary:#4361ee;
--bg:#f8fafc;
--card:#ffffff;
--text:#1e293b;
--sub:#64748b;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
nav{
width:240px;
background:var(--card);
border-right:1px solid #e2e8f0;
padding:30px 15px;
display:flex;
flex-direction:column;
gap:10px;
}

.logo{
font-size:20px;
font-weight:800;
color:var(--primary);
margin-bottom:20px;
text-align:center;
}

.nav-btn{
padding:12px;
border-radius:10px;
cursor:pointer;
display:flex;
gap:10px;
align-items:center;
color:var(--sub);
font-weight:600;
}

.nav-btn:hover{background:#f1f5f9}
.active{background:var(--primary);color:#fff}

/* MAIN */
main{
flex:1;
padding:30px;
overflow:auto;
}

/* LISTA */
.item{
background:var(--card);
padding:15px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
cursor:pointer;
border:1px solid #eef2f6;
transition:0.2s;
}

.item:hover{
transform:translateX(5px);
border-color:var(--primary);
}

/* BREADCRUMB */
.breadcrumb{
margin-bottom:15px;
color:var(--sub);
font-size:14px;
}

.breadcrumb span{
cursor:pointer;
color:var(--primary);
font-weight:600;
}

/* CALC */
.calc{
max-width:300px;
margin:auto;
}

.calc input{
width:100%;
padding:15px;
font-size:20px;
margin-bottom:10px;
}

/* BOLETIM */
.section{
background:var(--card);
padding:15px;
margin-bottom:15px;
border-radius:12px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:var(--primary);
color:#fff;
cursor:pointer;
margin-top:10px;
}

.hidden{display:none}
</style>
</head>

<body>

<nav>
<div class="logo">JN_PP</div>

<div class="nav-btn active" onclick="tab('mat',this)">📁 Materiais</div>
<div class="nav-btn" onclick="tab('calc',this)">🧮 Calculadora</div>
<div class="nav-btn" onclick="tab('bol',this)">📊 Boletim</div>

</nav>

<main>

<!-- MATERIAIS -->
<div id="mat">
<div class="breadcrumb" id="bc"></div>
<div id="lista"></div>
</div>

<!-- CALCULADORA -->
<div id="calc" class="hidden calc">
<input id="scr" readonly>
<button onclick="clr()">C</button>
<button onclick="bk()">⌫</button>
<button onclick="ins('/')">/</button>
<button onclick="ins('*')">*</button><br>
<button onclick="ins('7')">7</button>
<button onclick="ins('8')">8</button>
<button onclick="ins('9')">9</button>
<button onclick="ins('-')">-</button><br>
<button onclick="ins('4')">4</button>
<button onclick="ins('5')">5</button>
<button onclick="ins('6')">6</button>
<button onclick="ins('+')">+</button><br>
<button onclick="ins('1')">1</button>
<button onclick="ins('2')">2</button>
<button onclick="ins('3')">3</button>
<button onclick="res()">=</button>
</div>

<!-- BOLETIM -->
<div id="bol" class="hidden">
<div class="section">
<input id="nome" placeholder="Nome do aluno">
<input id="ex1e" placeholder="P1 Escrita">
<input id="ex1t" placeholder="P1 Teste">
<input id="ex2e" placeholder="P2 Escrita">
<input id="ex2t" placeholder="P2 Teste">
<input id="exv" placeholder="Valorada">
<button onclick="excel()">Gerar Excel</button>
</div>
</div>

</main>

<script>

/* TROCA DE TELA */
function tab(id,el){
document.querySelectorAll("main > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
document.querySelectorAll(".nav-btn").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
}

/* CALCULADORA */
function ins(v){scr.value+=v}
function clr(){scr.value=""}
function bk(){scr.value=scr.value.slice(0,-1)}
function res(){try{scr.value=eval(scr.value)}catch{scr.value="erro"}}

/* 🔥 CORREÇÃO DO 404 */
function caminhoSeguro(path){
return path.split('/').map(p=>encodeURIComponent(p)).join('/');
}

/* MATERIAIS */
let db=[];
let current="";

fetch("dados.txt?v="+Date.now())
.then(r=>r.text())
.then(t=>{
db=t.split("\n")
.map(l=>l.trim())
.filter(l=>l && !l.includes("[DIR]") && l.includes("/"));
render();
});

function render(){
let lista=document.getElementById("lista");
lista.innerHTML="";

let bc=document.getElementById("bc");
bc.innerHTML=`<span onclick="go('')">Início</span>`;

if(current){
let acc="";
current.split("/").forEach(p=>{
acc+=(acc?"/":"")+p;
bc.innerHTML+=` > <span onclick="go('${acc}')">${p}</span>`;
});
}

let pastas=new Set();
let files=[];

db.forEach(p=>{
if(!p.startsWith(current)) return;

let rest=p.slice(current.length).replace(/^\/+/,'');
let next=rest.split("/")[0];

if(rest.includes("/")) pastas.add(next);
else files.push(p);
});

pastas.forEach(p=>{
let div=document.createElement("div");
div.className="item";
div.innerHTML=`📁 ${p}`;
div.onclick=()=>go(current?current+"/"+p:p);
lista.appendChild(div);
});

files.forEach(f=>{
let a=document.createElement("a");
a.className="item";
a.href=caminhoSeguro(f);
a.target="_blank";
a.innerHTML=`📄 ${f.split("/").pop()}`;
lista.appendChild(a);
});
}

function go(p){
current=p;
render();
}

/* EXCEL */
function excel(){
let ex=(+ex1e.value+ +ex1t.value+ +ex2e.value+ +ex2t.value+ +exv.value)/2;

let wb=XLSX.utils.book_new();
let ws=XLSX.utils.aoa_to_sheet([
["Aluno",nome.value],
["Exatas",ex]
]);

XLSX.utils.book_append_sheet(wb,ws,"Boletim");
XLSX.writeFile(wb,"boletim.xlsx");
}

</script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</body>
</html>
