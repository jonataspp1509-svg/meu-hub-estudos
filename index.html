<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JN_PP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins;
background:#eef2ff;
padding:20px;
}

h1{
text-align:center;
color:#4f46e5;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
cursor:pointer;
box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

.card:hover{
background:#6366f1;
color:white;
}

.section{display:none;margin-top:20px}

input{
width:100%;
padding:8px;
margin:4px 0;
}

button{
background:#4f46e5;
color:white;
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.item{
background:white;
padding:10px;
border-radius:10px;
margin:5px 0;
}

.breadcrumb span{
color:#4f46e5;
cursor:pointer;
}
</style>
</head>

<body>

<h1>JN_PP</h1>

<div class="grid">
<div class="card" onclick="openSec('mat')">📁 Materiais</div>
<div class="card" onclick="openSec('calc')">🧮 Calculadora</div>
<div class="card" onclick="openSec('bol')">📊 Boletim</div>
</div>

<!-- MATERIAIS -->
<div id="mat" class="section">
<div id="bc"></div>
<div id="lista"></div>
</div>

<!-- CALC -->
<div id="calc" class="section">
<input id="scr">
<button onclick="calc()">=</button>
</div>

<!-- BOLETIM -->
<div id="bol" class="section">

<input id="nome" placeholder="Nome">

<h3>Matemática</h3>
<input id="mat1e" placeholder="P1 Escrita">
<input id="mat1t" placeholder="P1 Teste">
<input id="mat2e" placeholder="P2 Escrita">
<input id="mat2t" placeholder="P2 Teste">
<input id="matv" placeholder="Valorada">

<button onclick="calcular()">Calcular</button>
<button onclick="salvar()">Salvar Online</button>

<h2 id="res"></h2>

</div>

<script type="module">

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAGKQBoVgIDJzYOOkzukhTc6eRSXwJEv5I",
    authDomain: "estudos-ec2cf.firebaseapp.com",
    projectId: "estudos-ec2cf",

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* UI */
window.openSec=(id)=>{
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

/* CALC */
window.calc=()=>{
scr.value=eval(scr.value)
}

/* BASE */
const BASE = window.location.origin + "/meu-hub-estudos/";

/* MATERIAIS */
let dados=[], path="";

fetch("dados.txt?v="+Date.now())
.then(r=>r.text())
.then(t=>{
dados=t.split("\n").filter(l=>l.includes("/"));
render();
});

function render(){
lista.innerHTML="";
bc.innerHTML=`<span onclick="go('')">Início</span>`;

let past=new Set(), files=[];

dados.forEach(p=>{
if(!p.startsWith(path))return;

let rest=p.slice(path.length).replace(/^\/+/,'');
let next=rest.split("/")[0];

if(rest.includes("/")) past.add(next);
else files.push(p);
});

/* breadcrumb */
if(path){
let acc="";
path.split("/").forEach(p=>{
acc+=(acc?"/":"")+p;
bc.innerHTML+=` > <span onclick="go('${acc}')">${p}</span>`;
});
}

/* pastas */
past.forEach(p=>{
lista.innerHTML+=`<div class="item" onclick="go('${path?path+'/':''}${p}')">📁 ${p}</div>`;
});

/* arquivos */
files.forEach(f=>{
let link = BASE + "Estudos/" + encodeURI(f);
lista.innerHTML+=`<a class="item" target="_blank" href="${link}">📄 ${f.split('/').pop()}</a>`;
});
}

window.go=(p)=>{path=p;render();}

/* BOLETIM */
function v(id){return Number(document.getElementById(id).value)||0;}

window.calcular=()=>{
let media=(v("mat1e")+v("mat1t")+v("mat2e")+v("mat2t")+v("matv"))/2;
res.innerText="Média: "+media.toFixed(2);
}

/* FIREBASE SAVE */
window.salvar=async()=>{
await setDoc(doc(db,"alunos",nome.value),{
nome:nome.value,
media:res.innerText
});
alert("Salvo no Firebase!");
}

</script>

</body>
</html>
