<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JN_PP</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f4f6fb}
nav{display:flex;background:#4361ee;color:#fff;padding:10px;justify-content:space-around}
nav div{cursor:pointer;font-weight:bold}
.active{border-bottom:2px solid #fff}
.hidden{display:none}
main{padding:20px}

/* MATERIAIS */
.item{background:#fff;padding:10px;margin:5px 0;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between}
.breadcrumb span{cursor:pointer;color:#4361ee;font-weight:bold}

/* BOLETIM */
.section{background:#fff;padding:10px;margin:10px 0;border-radius:10px}
input{width:100%;margin:3px 0;padding:8px}

/* CALC */
.calc input{width:100%;padding:10px;font-size:20px;margin-bottom:10px}
</style>
</head>

<body>

<nav>
<div onclick="tab('mat')" class="active">Materiais</div>
<div onclick="tab('calc')">Calculadora</div>
<div onclick="tab('bol')">Boletim</div>
</nav>

<main>

<!-- MATERIAIS -->
<div id="mat">
<div class="breadcrumb" id="bc"></div>
<div id="lista"></div>
</div>

<!-- CALCULADORA -->
<div id="calc" class="hidden calc">
<input id="scr" readonly>
<button onclick="clr()">C</button>
<button onclick="bk()">⌫</button>
<button onclick="ins('/')">/</button>
<button onclick="ins('*')">*</button><br>
<button onclick="ins('7')">7</button>
<button onclick="ins('8')">8</button>
<button onclick="ins('9')">9</button>
<button onclick="ins('-')">-</button><br>
<button onclick="ins('4')">4</button>
<button onclick="ins('5')">5</button>
<button onclick="ins('6')">6</button>
<button onclick="ins('+')">+</button><br>
<button onclick="ins('1')">1</button>
<button onclick="ins('2')">2</button>
<button onclick="ins('3')">3</button>
<button onclick="res()">=</button>
</div>

<!-- BOLETIM -->
<div id="bol" class="hidden">

<input id="nome" placeholder="Nome do aluno">

<div class="section">
<h3>Exatas</h3>
<input id="ex1e" placeholder="P1 Escrita">
<input id="ex1t" placeholder="P1 Teste">
<input id="ex2e" placeholder="P2 Escrita">
<input id="ex2t" placeholder="P2 Teste">
<input id="exv" placeholder="Valorada">
</div>

<div class="section">
<h3>Humanas</h3>
<input id="hum1e">
<input id="hum1t">
<input id="hum2e">
<input id="hum2t">
<input id="humv">
</div>

<div class="section">
<h3>Filosofia</h3>
<input id="fil1">
<input id="fil2">
</div>

<div class="section">
<h3>Sociologia</h3>
<input id="soc1">
<input id="soc2">
</div>

<button onclick="salvar()">Salvar</button>
<button onclick="excel()">Gerar Excel</button>

</div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* COLOCA SUA CONFIG AQUI */
const firebaseConfig = {
  apiKey: "AIzaSyAGKQBoVgIDJzYOOkzukhTc6eRSXwJEv5I",
  authDomain: "estudos-ec2cf.firebaseapp.com",
  projectId: "estudos-ec2cf",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* TABS */
window.tab=function(x){
document.querySelectorAll("main > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(x).classList.remove("hidden");
}

/* CALC */
window.ins=v=>scr.value+=v;
window.clr=()=>scr.value="";
window.bk=()=>scr.value=scr.value.slice(0,-1);
window.res=()=>{try{scr.value=eval(scr.value)}catch{scr.value="erro"}}

/* SALVAR */
window.salvar=async function(){
let nome=document.getElementById("nome").value;

let dados={
ex1e:ex1e.value,
ex1t:ex1t.value,
ex2e:ex2e.value,
ex2t:ex2t.value,
exv:exv.value
};

await setDoc(doc(db,"alunos",nome),dados);

alert("Salvo!");
}

/* EXCEL */
window.excel=function(){
let ex=(+ex1e.value+ +ex1t.value+ +ex2e.value+ +ex2t.value+ +exv.value)/2;

let dados=[
["Aluno",nome.value],
["Exatas",ex]
];

let wb=XLSX.utils.book_new();
let ws=XLSX.utils.aoa_to_sheet(dados);
XLSX.utils.book_append_sheet(wb,ws,"Boletim");
XLSX.writeFile(wb,"boletim.xlsx");
}

/* MATERIAIS */
let dbtxt=[];
let path="";

fetch("dados.txt")
.then(r=>r.text())
.then(t=>{
dbtxt=t.split("\n").filter(l=>l.includes("/"));
render();
});

function render(){
let lista=document.getElementById("lista");
lista.innerHTML="";
let bc=document.getElementById("bc");
bc.innerHTML="";

let parts=path.split("/").filter(Boolean);
let acc="";
bc.innerHTML='<span onclick="go(\'\')">Início</span>';

parts.forEach(p=>{
acc+=(acc?"/":"")+p;
bc.innerHTML+=` > <span onclick="go('${acc}')">${p}</span>`;
});

let pastas=new Set();
let files=[];

dbtxt.forEach(l=>{
if(!l.startsWith(path))return;
let rest=l.slice(path.length).replace(/^\/+/,'');
let next=rest.split("/")[0];
if(rest.includes("/"))pastas.add(next);
else files.push(l);
});

pastas.forEach(p=>{
lista.innerHTML+=`<div class="item" onclick="go('${path?path+'/':''}${p}')">${p}</div>`;
});

files.forEach(f=>{
lista.innerHTML+=`<a class="item" target="_blank" href="${encodeURI(f)}">${f.split('/').pop()}</a>`;
});
}

window.go=function(p){path=p;render()}

</script>

</body>
</html>
