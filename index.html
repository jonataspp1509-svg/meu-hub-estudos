<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Hub de Estudos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .card { background: white; color: #333; padding: 20px; border-radius: 15px; display: inline-block; min-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .pasta-titulo { color: #f39c12; font-weight: bold; margin-bottom: 10px; font-size: 1.2em; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .file-item:hover { background: #f8f9fa; }
        .btn { background: #27ae60; color: white; border: none; padding: 5px 15px; cursor: pointer; border-radius: 5px; }
        .btn-pasta { background: #ff9800; }
        #viewer { margin-top: 20px; display: none; background: white; padding: 10px; border-radius: 10px; }
        img { max-width: 100%; height: auto; border-radius: 5px; }

                /* Estilo da Calculadora */
        .calc-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c3e50;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 200px;
            z-index: 1000;
        }
        .calc-display {
            width: 100%;
            height: 40px;
            background: #1a1a2e;
            color: #00ff00;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 5px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
            font-size: 1.2em;
            border: 1px solid #444;
        }
        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }
        .btn-calc {
            padding: 10px;
            background: #34495e;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-calc:hover { background: #456789; }
        .btn-equal { background: #27ae60; grid-column: span 2; }
        .btn-clear { background: #e74c3c; grid-column: span 2; }
    </style>
</head>
<body>

    <h1>📚 Gerenciador Jojo v5</h1>

    <div class="card">
        <input type="file" id="fileInput">
        <div id="statusPasta" class="pasta-titulo"></div>
        <div id="lista"></div>
    </div>

    <div id="viewer">
        <h4 id="nomeDoc" style="color: black;"></h4>
        <div id="conteudo"></div>
        <button onclick="document.getElementById('viewer').style.display='none'">Fechar</button>
    </div>

    <div class="calc-container">
    <div id="display" class="calc-display">0</div>
    <div class="calc-buttons">
        <button class="btn-calc btn-clear" onclick="limparCalc()">C</button>
        <button class="btn-calc btn-equal" onclick="calcular()">=</button>
        <button class="btn-calc" onclick="addNum('7')">7</button>
        <button class="btn-calc" onclick="addNum('8')">8</button>
        <button class="btn-calc" onclick="addNum('9')">9</button>
        <button class="btn-calc" onclick="addNum('/')">/</button>
        <button class="btn-calc" onclick="addNum('4')">4</button>
        <button class="btn-calc" onclick="addNum('5')">5</button>
        <button class="btn-calc" onclick="addNum('6')">6</button>
        <button class="btn-calc" onclick="addNum('*')">*</button>
        <button class="btn-calc" onclick="addNum('1')">1</button>
        <button class="btn-calc" onclick="addNum('2')">2</button>
        <button class="btn-calc" onclick="addNum('3')">3</button>
        <button class="btn-calc" onclick="addNum('-')">-</button>
        <button class="btn-calc" onclick="addNum('0')">0</button>
        <button class="btn-calc" onclick="addNum('.')">.</button>
        <button class="btn-calc" onclick="addNum('+')">+</button>
    </div>
</div>

    <script>
        let todasAsLinhas = [];
        let pastaRaizCpp = "";
        let pastaAtualRelativa = ""; 

        const fileInput = document.getElementById('fileInput');
        const listaDiv = document.getElementById('lista');
        const statusPasta = document.getElementById('statusPasta');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const conteudo = e.target.result;
                todasAsLinhas = conteudo.split('\n');
                
                if (todasAsLinhas[0].startsWith("Pasta:")) {
                    pastaRaizCpp = todasAsLinhas[0].replace("Pasta:", "").trim();
                    statusPasta.innerHTML = "📁 Pasta: " + pastaRaizCpp;
                }

                pastaAtualRelativa = ""; 
                renderizar();
            };
            reader.readAsText(file);
        });

        function renderizar() {
            listaDiv.innerHTML = "";

            if (pastaAtualRelativa !== "") {
                listaDiv.innerHTML += `
                    <div class="file-item" style="background: #eceff1; cursor:pointer" onclick="voltar()">
                        <span>⬅️ <b>Voltar</b></span>
                    </div>`;
            }

            todasAsLinhas.forEach(linha => {
                let linhaLimpa = linha.trim();
                if (!linhaLimpa || linhaLimpa.startsWith("Pasta:")) return;

                let eDiretorio = linhaLimpa.startsWith("[DIR]");
                let caminhoSemTag = linhaLimpa.replace("[DIR]", "");

                let pertenceAPasta = false;
                if (pastaAtualRelativa === "") {
                    pertenceAPasta = !caminhoSemTag.includes("/") && !caminhoSemTag.includes("\\");
                } else {
                    if (caminhoSemTag.startsWith(pastaAtualRelativa + "/") || caminhoSemTag.startsWith(pastaAtualRelativa + "\\")) {
                        let resto = caminhoSemTag.substring(pastaAtualRelativa.length + 1);
                        pertenceAPasta = !resto.includes("/") && !resto.includes("\\");
                    }
                }

                if (pertenceAPasta) {
                    let nomeParaExibir = caminhoSemTag.split(/[\\/]/).pop();
                    let caminhoCompleto = pastaRaizCpp + "/" + caminhoSemTag;

                    if (eDiretorio) {
                        listaDiv.innerHTML += `
                            <div class="file-item" style="background: #fff3e0; cursor:pointer" onclick="entrarNaPasta('${caminhoSemTag}')">
                                <span>📁 <b>${nomeParaExibir}</b></span>
                                <button class="btn btn-pasta">Abrir</button>
                            </div>`;
                    } else {
                        let isPdf = nomeParaExibir.toLowerCase().endsWith('.pdf');
                        listaDiv.innerHTML += `
                            <div class="file-item">
                                <span>${isPdf ? '📄' : '🖼️'} ${nomeParaExibir}</span>
                                <button class="btn" onclick="abrir('${caminhoCompleto}', ${isPdf}, '${nomeParaExibir}')">Abrir</button>
                            </div>`;
                    }
                }
            });
        }

        function entrarNaPasta(caminho) {
            pastaAtualRelativa = caminho;
            renderizar();
        }

        function voltar() {
            let partes = pastaAtualRelativa.split(/[\\/]/);
            partes.pop();
            pastaAtualRelativa = partes.join('/');
            renderizar();
        }

        function abrir(caminho, isPdf, nome) {
            if (isPdf) {
                window.open(caminho, '_blank');
            } else {
                const viewer = document.getElementById('viewer');
                const conteudo = document.getElementById('conteudo');
                document.getElementById('nomeDoc').innerText = nome;
                conteudo.innerHTML = `<img src="${caminho}">`;
                viewer.style.display = "block";
            }
        }

        let expressao = "";

        function addNum(num) {
            expressao += num;
            document.getElementById('display').innerText = expressao;
        }

        function limparCalc() {
            expressao = "";
            document.getElementById('display').innerText = "0";
        }

        function calcular() {
            try {
                // eval faz a conta mágica baseada no texto
                expressao = eval(expressao).toString();
                document.getElementById('display').innerText = expressao;
            } catch (e) {
                document.getElementById('display').innerText = "Erro";
                expressao = "";
            }
        }

        // Faz a calculadora aceitar teclas do teclado físico
        document.addEventListener('keydown', function(event) {
            const tecla = event.key;

            // Se for um número de 0 a 9 ou operadores
            if ("0123456789+-*/.".includes(tecla)) {
                addNum(tecla);
            } 
            // Se apertar Enter, calcula o resultado
            else if (tecla === "Enter") {
                event.preventDefault(); // Evita que a página recarregue
                calcular();
            } 
            // Se apertar Backspace (apagar), limpa tudo
            else if (tecla === "Backspace") {
                limparCalc();
            }
            // Se apertar Esc, também limpa
            else if (tecla === "Escape") {
                limparCalc();
            }
        });

    </script>
</body>
</html>
