<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Hub de Estudos - Provas e Médias</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #f1c40f; /* Amarelo Bloco de Notas */
            --bg-color: #f4f7f6;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { color: var(--primary-color); }

        /* --- ESTILO DO SIMULADOR (ESTILO CELULAR/BLOCO) --- */
        .card-medias {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            margin-bottom: 30px;
        }

        .card-medias h2 {
            margin-top: 0;
            font-size: 1.2rem;
            text-align: center;
            color: var(--primary-color);
        }

        .modo-seletor {
            display: flex;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 20px;
            padding: 5px;
        }

        .modo-seletor label {
            flex: 1;
            text-align: center;
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .modo-seletor input { display: none; }

        .modo-seletor input:checked + span {
            background: var(--primary-color);
            color: white;
            display: block;
            border-radius: 5px;
            padding: 5px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; }

        /* --- BLOCO DE NOTAS (RESULTADO) --- */
        .bloco-notas {
            margin-top: 20px;
            background: #fffef0; /* Cor de papel */
            border-left: 6px solid var(--accent-color);
            padding: 15px;
            border-radius: 5px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }

        .nota-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 5px;
        }

        .nota-final {
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        /* --- LISTA DE ARQUIVOS (O QUE O C++ GERA) --- */
        #lista-arquivos {
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <h1>📚 Meu Hub de Estudos</h1>

    <div class="card-medias">
        <h2>📊 Calcular Minha Nota</h2>
        
        <div class="modo-seletor">
            <label>
                <input type="radio" name="modo" value="media" checked onchange="trocarModo()">
                <span>Média (P1+P2)</span>
            </label>
            <label>
                <input type="radio" name="modo" value="soma" onchange="trocarModo()">
                <span>Soma (Filo/Socio)</span>
            </label>
        </div>

        <div class="input-group">
            <input type="number" id="p1" placeholder="Nota P1">
            <input type="number" id="tp1" placeholder="Teste P1">
        </div>

        <div id="sessao-p2">
            <div class="input-group">
                <input type="number" id="p2" placeholder="Nota P2">
                <input type="number" id="tp2" placeholder="Teste P2">
            </div>
        </div>

        <div class="input-group">
            <input type="number" id="valorada" placeholder="Valorada / Outros">
        </div>

        <button onclick="calcular()">Gerar Bloco de Notas</button>

        <div id="resultado-bloco" class="bloco-notas" style="display: none;">
            <div class="nota-item"><span>Total P1:</span> <strong id="res-p1">0</strong></div>
            <div id="res-item-p2" class="nota-item"><span>Total P2:</span> <strong id="res-p2">0</strong></div>
            <div class="nota-item"><span>Extras:</span> <strong id="res-val">0</strong></div>
            <div class="nota-final">
                <span id="label-final">Média:</span> 
                <strong id="res-total">0</strong>
            </div>
        </div>
    </div>

    <hr style="width: 80%; border: 0.5px solid #ccc;">

    <div id="lista-arquivos">
        <h3>📂 Conteúdos de Estudo</h3>
        </div>

    <script>
        function trocarModo() {
            const modo = document.querySelector('input[name="modo"]:checked').value;
            const sessaoP2 = document.getElementById('sessao-p2');
            const resItemP2 = document.getElementById('res-item-p2');
            const labelFinal = document.getElementById('label-final');

            if (modo === 'soma') {
                sessaoP2.style.display = 'none';
                resItemP2.style.display = 'none';
                labelFinal.innerText = 'Soma Total:';
            } else {
                sessaoP2.style.display = 'block';
                resItemP2.style.display = 'flex';
                labelFinal.innerText = 'Média Final:';
            }
        }

        function calcular() {
            const modo = document.querySelector('input[name="modo"]:checked').value;
            
            const p1 = parseFloat(document.getElementById('p1').value) || 0;
            const tp1 = parseFloat(document.getElementById('tp1').value) || 0;
            const p2 = parseFloat(document.getElementById('p2').value) || 0;
            const tp2 = parseFloat(document.getElementById('tp2').value) || 0;
            const valorada = parseFloat(document.getElementById('valorada').value) || 0;

            const totalP1 = p1 + tp1;
            const totalP2 = p2 + tp2;
            let final = 0;

            if (modo === 'media') {
                final = (totalP1 + totalP2 + valorada) / 3;
            } else {
                final = totalP1 + valorada;
            }

            // Preencher o Bloco
            document.getElementById('res-p1').innerText = totalP1.toFixed(1);
            document.getElementById('res-p2').innerText = totalP2.toFixed(1);
            document.getElementById('res-val').innerText = valorada.toFixed(1);
            document.getElementById('res-total').innerText = final.toFixed(1);

            // Mostrar resultado
            document.getElementById('resultado-bloco').style.display = 'block';

            // Cor baseada na nota (ex: 6.0)
            const corFinal = final >= 5 ? '#2ecc71' : '#e74c3c';
            document.getElementById('res-total').style.color = corFinal;
        }
    </script>
</body>
</html>
