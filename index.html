<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mendel Hub | Oficial</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
--primary:#4361ee;
--bg:#f8faff;
--sidebar:#ffffff;
--text-main:#1e293b;
--text-sub:#64748b;
--folder-icon:#ffca28;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text-main);display:flex;height:100vh;overflow:hidden;}

nav{width:260px;background:#fff;border-right:1px solid #e2e8f0;padding:40px 20px;}
.logo{font-size:1.5rem;font-weight:800;color:var(--primary);margin-bottom:40px;}
.nav-link{padding:12px;border-radius:10px;cursor:pointer;}

main{flex:1;padding:40px;overflow-y:auto;}

.item{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;}
.item:hover{border:1px solid var(--primary);}

.icon-folder{color:var(--folder-icon);}
.icon-file{color:#ef4444;}
</style>
</head>

<body>

<nav>
<div class="logo">MENDEL</div>
<div class="nav-link" onclick="changeTab('materiais')">Materiais</div>
<div class="nav-link" onclick="changeTab('calculadora')">Calculadora</div>
</nav>

<main>

<div id="materiais">
<div id="breadcrumb">Início</div>
<div id="list-container"></div>
</div>

<div id="calculadora" style="display:none;">
<input id="scr" readonly>
<button onclick="ins(1)">1</button>
<button onclick="res()">=</button>
</div>

</main>

<script>

let db = [];
let currentPath = "";

/* 🔥 PEGA O NOME DO REPOSITÓRIO AUTOMATICAMENTE */
const repo = window.location.pathname.split("/")[1];

/* 🔥 BASE CORRETA DO GITHUB */
const BASE = "/" + repo + "/";

/* -------------------- */

async function start(){
const res = await fetch("dados.txt?v=" + Date.now());
const txt = await res.text();

db = txt.split("\n")
.map(l => l.trim())
.filter(l => l !== "");

render();
}

function render(){
const container = document.getElementById("list-container");
container.innerHTML = "";

let folders = new Set();
let files = [];

db.forEach(path => {

let parts = path.split("/");

if(currentPath === ""){
if(parts.length > 1){
folders.add(parts[0]);
}else{
files.push(path);
}
}else{
if(path.startsWith(currentPath)){
let rest = path.replace(currentPath,"").replace(/^\/+/,"");
let next = rest.split("/")[0];

if(next && !next.includes(".")){
folders.add(next);
}else{
files.push(path);
}
}
}

});

/* Pastas */
folders.forEach(f=>{
let div = document.createElement("div");
div.className="item";
div.innerHTML = `<span><i class="fas fa-folder icon-folder"></i> ${f}</span>`;
div.onclick=()=>{
currentPath = currentPath ? currentPath + "/" + f : f;
render();
};
container.appendChild(div);
});

/* Arquivos */
files.forEach(f=>{

let a = document.createElement("a");
a.className="item";

/* 🔥 LINK CORRIGIDO AQUI */
a.href = BASE + "Estudos/" + f;

a.target="_blank";
a.innerHTML = `<span><i class="fas fa-file icon-file"></i> ${f.split("/").pop()}</span>`;

container.appendChild(a);
});

}

/* -------------------- */

function changeTab(tab){
document.getElementById("materiais").style.display = tab==="materiais"?"block":"none";
document.getElementById("calculadora").style.display = tab==="calculadora"?"block":"none";
}

/* calculadora */
function ins(v){scr.value+=v;}
function res(){scr.value=eval(scr.value);}

start();

</script>

</body>
</html>
