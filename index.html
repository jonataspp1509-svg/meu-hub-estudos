<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonatas Hub | Navegação Real</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4361ee; 
            --bg: #f8faff; 
            --sidebar: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --folder-icon: #ffca28;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Menu Lateral */
        nav { width: 260px; background: var(--sidebar); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 40px 20px; flex-shrink: 0; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-link { padding: 14px 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 600; color: var(--text-sub); transition: 0.3s; margin-bottom: 8px; text-decoration: none; }
        .nav-link:hover { background: #f1f5f9; color: var(--primary); }
        .nav-link.active { background: var(--primary); color: #fff; box-shadow: 0 10px 20px -5px rgba(67, 97, 238, 0.3); }

        /* Conteúdo */
        main { flex: 1; padding: 50px; overflow-y: auto; }
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 2rem; font-weight: 800; }

        /* Navegação (Caminho/Breadcrumb) */
        .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 25px; color: var(--text-sub); font-weight: 600; font-size: 0.9rem; }
        .breadcrumb span { cursor: pointer; transition: 0.2s; }
        .breadcrumb span:hover { color: var(--primary); }
        .breadcrumb i { font-size: 0.8rem; }

        /* Lista de Itens (Pastas e Arquivos) */
        .item-list { display: flex; flex-direction: column; gap: 8px; }
        
        .item { 
            background: #fff; padding: 16px 24px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: space-between; cursor: pointer;
            border: 1px solid #eef2f6; transition: 0.2s; text-decoration: none; color: inherit;
        }
        .item:hover { transform: translateX(5px); border-color: var(--primary); background: #fcfdfe; }
        .item-info { display: flex; align-items: center; gap: 15px; }
        
        /* Cores dos Ícones */
        .icon-folder { color: var(--folder-icon); font-size: 1.4rem; }
        .icon-file { color: #ef4444; font-size: 1.4rem; }

        .hidden { display: none; }

        /* Calculadora */
        .calc-wrapper { max-width: 360px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 30px; }
        .display { width: 100%; background: transparent; border: none; color: #fff; font-size: 2.8rem; text-align: right; margin-bottom: 25px; outline: none; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .c-btn { height: 60px; border-radius: 15px; border: none; background: #334155; color: #fff; font-size: 1.3rem; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div class="logo"><i class="fas fa-dna"></i> JOJO</div>
    <div class="nav-link active" onclick="changeTab('materiais', this)"><i class="fas fa-folder-open"></i> Materiais</div>
    <div class="nav-link" onclick="changeTab('calculadora', this)"><i class="fas fa-calculator"></i> Calculadora</div>

    <a href="https://pmais.p4ed.com/dashboard" target="_blank" class="nav-link"><i class="fas fa-graduation-cap"></i> Portal P+</a>

</nav>

<main>
    <div id="materiais">
        <div class="header">
            <h1 id="view-title">Disciplinas</h1>
        </div>

        <div class="breadcrumb" id="breadcrumb">
            <span onclick="goToPath('')">Início</span>
        </div>

        <div id="list-container" class="item-list"></div>
    </div>

    <div id="calculadora" class="hidden">
        <div class="header"><h1>Calculadora</h1></div>
        <div class="calc-wrapper">
            <input type="text" id="scr" class="display" readonly placeholder="0">
            <div class="btn-grid">
                <button class="c-btn" onclick="clr()">C</button>
                <button class="c-btn" style="background:var(--primary)" onclick="ins('/')">/</button>
                <button class="c-btn" style="background:var(--primary)" onclick="ins('*')">×</button>
                <button class="c-btn" onclick="bk()">⌫</button>
                <button class="c-btn" onclick="ins('7')">7</button>
                <button class="c-btn" onclick="ins('8')">8</button>
                <button class="c-btn" onclick="ins('9')">9</button>
                <button class="c-btn" style="background:var(--primary)" onclick="ins('-')">-</button>
                <button class="c-btn" onclick="ins('4')">4</button>
                <button class="c-btn" onclick="ins('5')">5</button>
                <button class="c-btn" onclick="ins('6')">6</button>
                <button class="c-btn" style="background:var(--primary)" onclick="ins('+')">+</button>
                <button class="c-btn" onclick="ins('1')">1</button>
                <button class="c-btn" onclick="ins('2')">2</button>
                <button class="c-btn" onclick="ins('3')">3</button>
                <button class="c-btn" style="background:#10b981; grid-column: span 1;" onclick="res()">=</button>
                <button class="c-btn" style="grid-column: span 2;" onclick="ins('0')">0</button>
                <button class="c-btn" onclick="ins('.')">.</button>
            </div>
        </div>
    </div>
</main>

<script>
    let db = [];
    let currentPath = ""; // Ex: "Biologia/Croti"

    async function start() {
        const response = await fetch('dados.txt?v=' + Date.now());
        const text = await response.text();
        db = text.split('\n')
                 .filter(l => l.trim() !== "")
                 .map(l => l.replace(/\\/g, '/').replace("[ARQ]", "").replace("[DIR]", "").replace("Pasta:", "").trim());
        render();
    }

    function render() {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        updateBreadcrumb();

        let items = new Set();
        let files = [];

        db.forEach(line => {
            let path = line;
            if(path.startsWith("Estudos/")) path = path.replace("Estudos/", "");

            // Se estamos na raiz ("") e o caminho é "Biologia/Aula.pdf"
            // Se estamos em "Biologia" e o caminho é "Biologia/Croti/Doc.pdf"
            if (currentPath === "" || path.startsWith(currentPath + "/")) {
                let relativePath = currentPath === "" ? path : path.replace(currentPath + "/", "");
                let parts = relativePath.split('/');

                if (parts.length > 1) {
                    // É uma subpasta
                    items.add(parts[0]);
                } else if (parts.length === 1 && line.toLowerCase().includes('.pdf')) {
                    // É um arquivo nesta pasta
                    files.push({ name: parts[0], full: line });
                }
            }
        });

        // Renderiza Pastas
        items.forEach(folder => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<div class="item-info"><i class="fas fa-folder icon-folder"></i><span>${folder}</span></div><i class="fas fa-chevron-right" style="color:#cbd5e1"></i>`;
            div.onclick = () => {
                currentPath = currentPath === "" ? folder : currentPath + "/" + folder;
                render();
            };
            container.appendChild(div);
        });

        // Renderiza Arquivos
        files.forEach(file => {
            const a = document.createElement('a');
            a.className = 'item';
            a.href = encodeURI(file.full);
            a.target = "_blank";
            a.innerHTML = `<div class="item-info"><i class="fas fa-file-pdf icon-file"></i><span>${file.name}</span></div><i class="fas fa-external-link-alt" style="color:#cbd5e1; font-size:0.8rem"></i>`;
            container.appendChild(a);
        });
    }

    function updateBreadcrumb() {
        const bc = document.getElementById('breadcrumb');
        bc.innerHTML = `<span onclick="goToPath('')">Início</span>`;
        
        if (currentPath !== "") {
            let parts = currentPath.split('/');
            let tempPath = "";
            parts.forEach((p, i) => {
                tempPath += (i === 0 ? p : "/" + p);
                const pathCapture = tempPath; 
                bc.innerHTML += ` <i class="fas fa-chevron-right"></i> <span onclick="goToPath('${pathCapture}')">${p}</span>`;
            });
        }
    }

    function goToPath(path) {
        currentPath = path;
        render();
    }

    function changeTab(id, el) {
        document.getElementById('materiais').classList.add('hidden');
        document.getElementById('calculadora').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    // Calc
    const s = document.getElementById('scr');
    function ins(v) { s.value += v; }
    function clr() { s.value = ""; }
    function bk() { s.value = s.value.slice(0, -1); }
    function res() { try { s.value = eval(s.value); } catch { s.value = "Erro"; } }

    start();
</script>
</body>
</html>
