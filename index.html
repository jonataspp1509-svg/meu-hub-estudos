<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>StudyFlow</title>

<style>
body{margin:0;font-family:Arial;background:#eef2ff}
#loginScreen{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  display:flex;align-items:center;justify-content:center;z-index:9999;
}
.login-box{background:#fff;padding:30px;border-radius:20px;text-align:center}
button{padding:10px;border:none;background:#4f46e5;color:#fff;border-radius:10px;cursor:pointer;margin:5px}
nav{display:flex;gap:10px;padding:10px}
.page{display:none;padding:20px}
.active{display:block}
.card{background:#fff;padding:20px;margin:10px;border-radius:15px}
.calc input{width:100%;padding:10px;margin-bottom:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>StudyFlow</h1>
    <button onclick="loginGoogle()">Entrar com Google</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<nav>
  <button onclick="abrir('materiais')">📁 Materiais</button>
  <button onclick="abrir('calc')">🧮 Calculadora</button>
  <button onclick="abrir('boletim')">📊 Boletim</button>
  <button onclick="abrir('jogo')">🎮 Jogo</button>
  <button onclick="abrir('ranking')">🏆 Ranking</button>
</nav>

<!-- MATERIAIS -->
<section id="materiais" class="page active">
  <div class="card">📁 Aqui você coloca seus PDFs (usa seu sistema atual)</div>
</section>

<!-- CALCULADORA -->
<section id="calc" class="page">
  <div class="card calc">
    <input id="calcDisplay" readonly>
    <button onclick="calc('7')">7</button>
    <button onclick="calc('8')">8</button>
    <button onclick="calc('9')">9</button>
    <button onclick="calc('/')">÷</button><br>
    <button onclick="calc('4')">4</button>
    <button onclick="calc('5')">5</button>
    <button onclick="calc('6')">6</button>
    <button onclick="calc('*')">×</button><br>
    <button onclick="calc('1')">1</button>
    <button onclick="calc('2')">2</button>
    <button onclick="calc('3')">3</button>
    <button onclick="calc('-')">-</button><br>
    <button onclick="calc('0')">0</button>
    <button onclick="calc('.')">.</button>
    <button onclick="resultado()">=</button>
    <button onclick="calc('+')">+</button>
  </div>
</section>

<!-- BOLETIM -->
<section id="boletim" class="page">
  <div class="card">
    <h2>Boletim</h2>
    <input placeholder="P1" id="p1">
    <input placeholder="P2" id="p2">
    <input placeholder="P3" id="p3">
    <input placeholder="P4" id="p4">
    <button onclick="media()">Calcular</button>
    <div id="resMedia"></div>
  </div>
</section>

<!-- JOGO -->
<section id="jogo" class="page">
  <div class="card">
    <input id="nomeJogador" placeholder="Seu nome">
    <div id="pergunta"></div>
    <div id="respostas"></div>
    <div id="feedback"></div>
  </div>
</section>

<!-- RANKING -->
<section id="ranking" class="page">
  <div class="card">
    <h2>Top 5</h2>
    <div id="rankingLista"></div>
  </div>
</section>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const config={
  apiKey:"AIzaSyAGKQBoVgIDJzYOOkzukhTc6eRSXwJEv5I",
  authDomain:"estudos-ec2cf.firebaseapp.com",
  projectId:"estudos-ec2cf"
};

const app=initializeApp(config);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();
const db=getFirestore(app);

window.loginGoogle=async()=>{
  const r=await signInWithPopup(auth,provider);
  if(!r.user.email.endsWith("@p4ed.com")) return alert("Use email escolar");
  loginScreen.style.display="none";
  appDiv.style.display="block";
};

window.salvarRanking=async(n,e)=>{
  const ref=doc(db,"ranking",n);
  const snap=await getDoc(ref);
  let total=e;
  if(snap.exists()) total+=snap.data().estrelas||0;
  await setDoc(ref,{nome:n,estrelas:total});
};

window.carregarRanking=async()=>{
  const q=await getDocs(collection(db,"ranking"));
  let arr=[];
  q.forEach(d=>arr.push(d.data()));
  arr.sort((a,b)=>b.estrelas-a.estrelas);
  rankingLista.innerHTML=arr.slice(0,5)
    .map(x=>x.nome+" ⭐"+x.estrelas).join("<br>");
};
</script>

<script>
const appDiv=document.getElementById("app");

function abrir(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="ranking") carregarRanking();
}

/* CALCULADORA */
function calc(v){calcDisplay.value+=v}
function resultado(){calcDisplay.value=eval(calcDisplay.value)}

/* BOLETIM */
function media(){
  let m=(+p1.value + +p2.value + +p3.value + +p4.value)/4;
  resMedia.innerText="Média: "+m.toFixed(2);
}

/* JOGO */
let perguntas=[
{q:"sen(2a)?",a:["2sen(a)cos(a)","sen²"],c:0,exp:"fórmula"},
{q:"cos(2a)?",a:["cos²-sen²","2cos"],c:0,exp:"fórmula"}
];

let atual=0,estrelas=0;

function mostrar(){
  let p=perguntas[atual];
  pergunta.innerText=p.q;
  respostas.innerHTML=p.a.map((x,i)=>`<button onclick="resp(${i})">${x}</button>`).join("");
}

function resp(i){
  let p=perguntas[atual];
  if(i===p.c){estrelas++; feedback.innerHTML="Acertou<br><button onclick='prox()'>Next</button>";}
  else feedback.innerHTML="Errado "+p.exp+"<br><button onclick='prox()'>Next</button>";
}

async function prox(){
  atual++;
  if(atual>=perguntas.length){
    let nome=nomeJogador.value;
    await salvarRanking(nome,estrelas);
    feedback.innerText="Fim: "+estrelas+" estrelas";
    return;
  }
  mostrar();
}

mostrar();
</script>

</body>
</html>
