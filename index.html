<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mendel Hub</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#4361ee,#7209b7);
color:#fff;
}

/* CENTRAL */
.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */
.card{
background:#fff;
color:#000;
padding:25px;
border-radius:15px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* INPUT */
input{
width:100%;
margin:5px 0;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

/* BUTTON */
button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#4361ee;
color:#fff;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#3a56d4;
}

.hidden{display:none}
h3{text-align:center}

/* SCROLL */
.app{
padding:20px;
max-width:500px;
margin:auto;
}

.section{
background:#fff;
color:#000;
padding:15px;
margin:10px 0;
border-radius:10px;
}

h4{margin:10px 0 5px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
<div class="card">
<h3>Login</h3>
<input id="user" placeholder="Digite seu nome">
<button onclick="entrar()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="app">

<h2 id="nomeAluno"></h2>

<div class="section">
<h4>Exatas</h4>
<input id="mat1" placeholder="Nota 1">
<input id="mat2">
<input id="mat3">
<input id="matVal" placeholder="Valorada">
</div>

<div class="section">
<h4>Humanas</h4>
<input id="hum1">
<input id="hum2">
<input id="humVal">
</div>

<div class="section">
<h4>Redação</h4>
<input id="red1">
<input id="red2">
<input id="redVal">
</div>

<div class="section">
<h4>Inglês</h4>
<input id="ing1">
<input id="ing2">
<input id="ingVal">
</div>

<div class="section">
<h4>Filosofia</h4>
<input id="fil1">
<input id="fil2">
</div>

<div class="section">
<h4>Sociologia</h4>
<input id="soc1">
<input id="soc2">
</div>

<button onclick="salvar()">💾 Salvar Online</button>
<button onclick="carregar()">📂 Carregar</button>
<button onclick="gerarExcel()">📊 Baixar Excel</button>
<button onclick="sair()">🚪 Sair</button>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* CONFIG (COLOCA A SUA) */
const firebaseConfig = {
  apiKey: "AIzaSyAGKQBoVgIDJzYOOkzukhTc6eRSXwJEv5I",
  authDomain: "estudos-ec2cf.firebaseapp.com",
  projectId: "estudos-ec2cfI",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let aluno = "";

/* LOGIN */
window.entrar = function(){
aluno = document.getElementById("user").value;
if(!aluno) return alert("Digite seu nome");

document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("nomeAluno").innerText = "Aluno: " + aluno;

carregar();
}

/* SALVAR ONLINE */
window.salvar = async function(){

let dados = {
mat1:mat1.value, mat2:mat2.value, mat3:mat3.value, matVal:matVal.value,
hum1:hum1.value, hum2:hum2.value, humVal:humVal.value,
red1:red1.value, red2:red2.value, redVal:redVal.value,
ing1:ing1.value, ing2:ing2.value, ingVal:ingVal.value,
fil1:fil1.value, fil2:fil2.value,
soc1:soc1.value, soc2:soc2.value
};

await setDoc(doc(db, "alunos", aluno), dados);

alert("Salvo online!");
}

/* CARREGAR */
window.carregar = async function(){

const ref = doc(db, "alunos", aluno);
const snap = await getDoc(ref);

if(snap.exists()){
let d = snap.data();

mat1.value=d.mat1||"";
mat2.value=d.mat2||"";
mat3.value=d.mat3||"";
matVal.value=d.matVal||"";

hum1.value=d.hum1||"";
hum2.value=d.hum2||"";
humVal.value=d.humVal||"";

red1.value=d.red1||"";
red2.value=d.red2||"";
redVal.value=d.redVal||"";

ing1.value=d.ing1||"";
ing2.value=d.ing2||"";
ingVal.value=d.ingVal||"";

fil1.value=d.fil1||"";
fil2.value=d.fil2||"";

soc1.value=d.soc1||"";
soc2.value=d.soc2||"";
}
}

/* EXCEL */
window.gerarExcel = function(){

let ex=(+mat1.value+ +mat2.value+ +mat3.value+ +matVal.value)/2;
let hum=(+hum1.value+ +hum2.value+ +humVal.value)/2;
let red=(+red1.value+ +red2.value+ +redVal.value)/2;
let ing=(+ing1.value+ +ing2.value+ +ingVal.value)/2;
let filo=(+fil1.value+ +fil2.value);
let socio=(+soc1.value+ +soc2.value);

let geral=(ex+hum+red+ing+filo+socio)/6;
let status=geral>=6?"Aprovado":"Reprovado";

let dados=[
["Aluno",aluno],
[],
["Exatas",ex],
["Humanas",hum],
["Redação",red],
["Inglês",ing],
["Filosofia",filo],
["Sociologia",socio],
[],
["Média Geral",geral],
["Status",status]
];

let wb=XLSX.utils.book_new();
let ws=XLSX.utils.aoa_to_sheet(dados);

XLSX.utils.book_append_sheet(wb,ws,"Boletim");

XLSX.writeFile(wb,"Boletim_"+aluno+".xlsx");
}

/* SAIR */
window.sair = function(){
location.reload();
}

</script>

</body>
</html>
