<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendel Hub | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #4361ee; --bg: #f8faff; --txt: #1e293b; --sub: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--txt); display: flex; height: 100vh; }

        /* Sidebar */
        nav { width: 260px; background: #fff; border-right: 1px solid #e2e8f0; padding: 40px 20px; flex-shrink: 0; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--p); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-link { 
            padding: 12px 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; 
            font-weight: 600; color: var(--sub); transition: 0.2s; margin-bottom: 5px;
        }
        .nav-link:hover { background: #f1f5f9; }
        .nav-link.active { background: var(--p); color: #fff; }

        /* Main */
        main { flex: 1; padding: 50px; overflow-y: auto; }
        .header { margin-bottom: 40px; }
        .header h1 { font-size: 2rem; font-weight: 800; }

        /* Grid de Matérias */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { 
            background: #fff; padding: 30px; border-radius: 20px; text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); cursor: pointer; transition: 0.3s; border: 1px solid transparent;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--p); box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .card i { font-size: 2rem; color: var(--p); margin-bottom: 15px; display: block; }
        .card h3 { font-size: 1.1rem; font-weight: 700; }

        /* Lista de Arquivos */
        .file-box { background: #fff; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); overflow: hidden; }
        .file-row { 
            display: flex; align-items: center; padding: 20px 25px; border-bottom: 1px solid #f1f5f9; 
            text-decoration: none; color: inherit; transition: 0.2s;
        }
        .file-row:hover { background: #f8faff; }
        .file-icon { font-size: 1.5rem; color: #ef4444; margin-right: 20px; }
        .file-info { flex: 1; }
        .file-info span { display: block; }
        .path-label { font-size: 0.7rem; font-weight: 800; color: var(--p); text-transform: uppercase; margin-bottom: 2px; }
        .name-label { font-weight: 600; }

        .btn-back { 
            background: #fff; border: 1px solid #e2e8f0; padding: 10px 20px; border-radius: 10px; 
            cursor: pointer; font-weight: 700; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 8px;
        }

        .hidden { display: none; }

        /* Calculadora */
        .calc-box { max-width: 350px; background: #1e293b; padding: 25px; border-radius: 25px; margin: 0 auto; }
        .display { width: 100%; background: none; border: none; color: #fff; font-size: 2.5rem; text-align: right; margin-bottom: 20px; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn { height: 60px; border-radius: 12px; border: none; background: #334155; color: #fff; font-size: 1.2rem; cursor: pointer; }
        .btn.op { background: var(--p); }
        .btn.eq { background: #10b981; grid-column: span 2; }
    </style>
</head>
<body>

<nav>
    <div class="logo"><i class="fas fa-brain"></i> MENDEL</div>
    <div class="nav-link active" onclick="switchPage('page-materias', this)"><i class="fas fa-book"></i> Materiais</div>
    <div class="nav-link" onclick="switchPage('page-calc', this)"><i class="fas fa-calculator"></i> Calculadora</div>
</nav>

<main>
    <div id="page-materias">
        <div class="header">
            <h1>Meus Conteúdos</h1>
            <p id="sub-msg">Selecione uma disciplina abaixo.</p>
        </div>

        <div id="grid-subjects" class="grid"></div>

        <div id="file-view" class="hidden">
            <button class="btn-back" onclick="showGrid()"><i class="fas fa-arrow-left"></i> Voltar</button>
            <h2 id="folder-name" style="margin-bottom: 20px;"></h2>
            <div id="file-container" class="file-box"></div>
        </div>
    </div>

    <div id="page-calc" class="hidden">
        <div class="header"><h1>Calculadora</h1></div>
        <div class="calc-box">
            <input type="text" id="res" class="display" readonly placeholder="0">
            <div class="buttons">
                <button class="btn" onclick="clearRes()">C</button>
                <button class="btn op" onclick="ins('/')">/</button>
                <button class="btn op" onclick="ins('*')">x</button>
                <button class="btn op" onclick="ins('-')">-</button>
                <button class="btn" onclick="ins('7')">7</button>
                <button class="btn" onclick="ins('8')">8</button>
                <button class="btn" onclick="ins('9')">9</button>
                <button class="btn op" onclick="ins('+')">+</button>
                <button class="btn" onclick="ins('4')">4</button>
                <button class="btn" onclick="ins('5')">5</button>
                <button class="btn" onclick="ins('6')">6</button>
                <button class="btn" onclick="solve()">=</button>
                <button class="btn" onclick="ins('1')">1</button>
                <button class="btn" onclick="ins('2')">2</button>
                <button class="btn" onclick="ins('3')">3</button>
                <button class="btn" onclick="ins('0')">0</button>
            </div>
        </div>
    </div>
</main>

<script>
    let lines = [];

    // Busca os dados e limpa tudo
    async function load() {
        const r = await fetch('dados.txt?v=' + Date.now());
        const t = await r.text();
        lines = t.split('\n').map(l => l.replace(/\\/g, '/').trim()).filter(l => l !== "");
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('grid-subjects');
        grid.innerHTML = "";
        let subjects = new Set();

        lines.forEach(line => {
            // Pega o que está entre Estudos/ e a próxima barra
            // Se a linha for "Estudos/Biologia/Croti", ele pega "Biologia"
            let clean = line.replace("[DIR]", "").replace("[ARQ]", "").replace("Pasta:", "").trim();
            let parts = clean.split('/');
            
            let name = "";
            if (parts[0] === "Estudos" && parts[1]) name = parts[1];
            else if (parts[0] !== "Estudos") name = parts[0];

            if (name && name !== "Estudos") subjects.add(name);
        });

        subjects.forEach(s => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<i class="fas fa-folder"></i><h3>${s}</h3>`;
            div.onclick = () => showFiles(s);
            grid.appendChild(div);
        });
    }

    function showFiles(subject) {
        document.getElementById('grid-subjects').classList.add('hidden');
        document.getElementById('file-view').classList.remove('hidden');
        document.getElementById('folder-name').innerText = subject;
        document.getElementById('sub-msg').classList.add('hidden');

        const container = document.getElementById('file-container');
        container.innerHTML = "";

        lines.forEach(line => {
            // Se for um arquivo e contiver o nome da matéria no caminho
            if (line.includes("[ARQ]") && line.toLowerCase().includes(subject.toLowerCase())) {
                let fullPath = line.replace("[ARQ]", "").trim();
                let parts = fullPath.split('/');
                let fileName = parts.pop();
                let breadcrumb = parts.slice(parts.indexOf(subject) + 1).join(' > ');

                const a = document.createElement('a');
                a.className = 'file-row';
                a.href = encodeURI(fullPath);
                a.target = "_blank";
                a.innerHTML = `
                    <i class="fas fa-file-pdf file-icon"></i>
                    <div class="file-info">
                        ${breadcrumb ? `<span class="path-label">${breadcrumb}</span>` : ''}
                        <span class="name-label">${fileName}</span>
                    </div>
                `;
                container.appendChild(a);
            }
        });

        if (container.innerHTML === "") {
            container.innerHTML = "<p style='padding:40px; text-align:center;'>Nenhum PDF encontrado para " + subject + ".</p>";
        }
    }

    function showGrid() {
        document.getElementById('grid-subjects').classList.remove('hidden');
        document.getElementById('file-view').classList.add('hidden');
        document.getElementById('sub-msg').classList.remove('hidden');
    }

    function switchPage(id, el) {
        document.getElementById('page-materias').classList.add('hidden');
        document.getElementById('page-calc').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    // Calc
    const screen = document.getElementById('res');
    function ins(v) { screen.value += v; }
    function clearRes() { screen.value = ""; }
    function solve() { try { screen.value = eval(screen.value); } catch { screen.value = "Erro"; } }

    load();
</script>
</body>
</html>
